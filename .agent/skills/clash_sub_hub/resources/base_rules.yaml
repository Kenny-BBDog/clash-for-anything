# Clash Base Rules Template (Professional)
# Ported from Sub Hub v3 Release

port: 7890
socks-port: 7891
allow-lan: false
mode: rule
log-level: info

dns:
  enable: true
  enhanced-mode: fake-ip
  nameserver:
    - 119.29.29.29
    - 223.5.5.5
  fallback:
    - 8.8.8.8

# Managed Proxies Injected Here
proxies: []

proxy-groups:
  - name: 🚀 代理选择
    type: select
    proxies:
      - ♻️ 自动选择
      - DIRECT

  - name: ♻️ 自动选择
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    proxies: []

  - name: 住宅IP
    type: select
    proxies:
      - 🚀 代理选择
      - DIRECT

rule-providers:
  ai:
    type: http
    behavior: classical
    url: "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/OpenAI/OpenAI.yaml"
    path: ./rules/ai.yaml
    interval: 86400

  claude:
    type: http
    behavior: classical
    url: "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Claude/Claude.yaml"
    path: ./rules/claude.yaml
    interval: 86400

rules:
  - IP-CIDR,127.0.0.0/8,DIRECT,no-resolve
  - RULE-SET,ai,住宅IP
  - RULE-SET,claude,住宅IP
  - DOMAIN-SUFFIX,cn,DIRECT
  - MATCH,🚀 代理选择
