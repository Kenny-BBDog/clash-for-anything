# Clash 配置 - 美国单节点分享版
# 适用客户端: Clash Verge, Clash for Windows, Shadowrocket, Stash

port: 7890
socks-port: 7891
mixed-port: 7892
allow-lan: true
mode: rule
log-level: info
ipv6: false

dns:
  enable: true
  enhanced-mode: fake-ip
  nameserver:
    - 119.29.29.29
    - 223.5.5.5
  fallback:
    - https://dns.google/dns-query

proxies:
  - name: "美国专用测试节点"
    type: vless
    server: 64.186.234.15
    port: 48870
    uuid: e7bef160-d9db-4e98-81f2-b346ec4d1c33
    tls: true
    flow: xtls-rprx-vision
    servername: www.oracle.com
    client-fingerprint: chrome
    network: tcp
    reality-opts:
      public-key: ojTyzmLo5kp63KO99GwDxaE0CIjkhiI3xV9eiUOs7lE
      short-id: "9b"

proxy-groups:
  - name: "🚀 代理选择"
    type: select
    proxies:
      - "美国专用测试节点"
      - DIRECT

rules:
  # 私有网络
  - IP-CIDR,127.0.0.0/8,DIRECT
  - IP-CIDR,192.168.0.0/16,DIRECT
  # 国内 IP
  - GEOIP,CN,DIRECT
  # 其余全部走代理
  - MATCH,"🚀 代理选择"
